name: Deploy Snaphomz India to AWS

# Architecture matches snaphomz.com exactly:
#   Namecheap ALIAS record -> CloudFront (live DNS)
#   Route53 hosted zone exists with A/AAAA records (ready for future NS delegation)
#   ACM cert already ISSUED - imported by ARN, no DNS validation wait

on:
  push:
    branches:
      - main
      - develop
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - staging
          - demo

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'
  # ACM cert for snaphomz.in - already ISSUED in us-east-1 (required for CloudFront)
  CERTIFICATE_ARN: arn:aws:acm:us-east-1:075502422618:certificate/cb92c6e2-9b6e-4426-b9ca-045b67bd4499

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || github.ref == 'refs/heads/staging' && 'staging' || 'demo' }}
      url: https://snaphomz.in

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
          else
            case "${{ github.ref }}" in
              refs/heads/main)     ENVIRONMENT="prod"    ;;
              refs/heads/staging)  ENVIRONMENT="staging" ;;
              *)                   ENVIRONMENT="demo"    ;;
            esac
          fi
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "Deploying to: $ENVIRONMENT"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Build Vite application
        run: npm run build

      - name: Install CDK dependencies
        working-directory: infra
        run: npm install

      - name: Build CDK TypeScript
        working-directory: infra
        run: npm run build

      - name: Deploy CDK stack
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
          CUSTOM_DOMAIN: snaphomz.in
          CERTIFICATE_ARN: ${{ env.CERTIFICATE_ARN }}
        run: |
          echo "Deploying snaphomz-india-$ENVIRONMENT..."
          npx cdk deploy snaphomz-india-$ENVIRONMENT --require-approval never
          echo "CDK stack deployed"

      - name: Get deployment resources
        id: resources
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          BUCKET=$(aws ssm get-parameter --name /snaphomz/india/$ENVIRONMENT/bucket-name --query 'Parameter.Value' --output text)
          DIST_ID=$(aws ssm get-parameter --name /snaphomz/india/$ENVIRONMENT/distribution-id --query 'Parameter.Value' --output text)
          DIST_DOMAIN=$(aws ssm get-parameter --name /snaphomz/india/$ENVIRONMENT/distribution-domain --query 'Parameter.Value' --output text)
          echo "bucket=$BUCKET"           >> $GITHUB_OUTPUT
          echo "dist-id=$DIST_ID"         >> $GITHUB_OUTPUT
          echo "dist-domain=$DIST_DOMAIN" >> $GITHUB_OUTPUT

      - name: Upload to S3
        env:
          BUCKET: ${{ steps.resources.outputs.bucket }}
        run: |
          aws s3 sync dist/ s3://$BUCKET/ --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "*.html" --exclude "*.json" --exclude "*.xml"
          aws s3 sync dist/ s3://$BUCKET/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" --content-type "text/html"
          aws s3 sync dist/ s3://$BUCKET/ \
            --cache-control "public, max-age=3600" \
            --include "*.json" --include "*.xml"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.resources.outputs.dist-id }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "Deployment complete!"
          echo "  URL:       https://snaphomz.in"
          echo "  CF Domain: https://${{ steps.resources.outputs.dist-domain }}"
          echo "  Bucket:    ${{ steps.resources.outputs.bucket }}"
          echo "  Dist ID:   ${{ steps.resources.outputs.dist-id }}"
