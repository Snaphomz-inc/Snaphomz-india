name: Deploy Snaphomz India to AWS

# 4-job architecture:
#   Job 1 (setup):               determine environment from branch
#   Job 2 (hosted-zone):         create Route53 hosted zone if not exists, output zone ID
#   Job 3 (prepare-certificate): find/create ACM cert (snaphomz.in + www.snaphomz.in)
#                                  - First run: prints Namecheap CNAME instructions + fails
#                                  - Re-run after cert ISSUED: outputs cert ARN
#   Job 4 (deploy):              build Vite, CDK deploy (S3+CF+cert by ARN), S3 upload, CF invalidate
#
# Why no cert creation in CDK: Namecheap is authoritative (not Route53), so CDK's
# CertificateValidation.fromDns() would add CNAMEs to Route53 but ACM validates against
# Namecheap — validation never completes and the OIDC token (1h) expires.

on:
  push:
    branches:
      - main
      - develop
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - staging
          - demo

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Determine environment ───────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Set environment from branch
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
          else
            case "${{ github.ref }}" in
              refs/heads/main)     ENVIRONMENT="prod"    ;;
              refs/heads/staging)  ENVIRONMENT="staging" ;;
              refs/heads/develop)  ENVIRONMENT="demo"    ;;
              *)                   ENVIRONMENT="demo"    ;;
            esac
          fi
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "Deploying to: $ENVIRONMENT"

  # ── Job 2: Create Route53 Hosted Zone (idempotent, skips if exists) ────────
  hosted-zone:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      hosted_zone_id: ${{ steps.get-zone.outputs.hosted_zone_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install CDK dependencies
        working-directory: infra
        run: npm install

      - name: Build CDK TypeScript
        working-directory: infra
        run: npm run build

      - name: Deploy SnaphomzHostedZone stack (idempotent)
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
          DOMAIN_NAME: snaphomz.in
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name SnaphomzHostedZone \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          if [[ "$STACK_STATUS" == "DOES_NOT_EXIST" ]]; then
            echo "Creating SnaphomzHostedZone stack..."
            npx cdk deploy SnaphomzHostedZone --require-approval never
            echo "Hosted zone stack created"
          else
            echo "SnaphomzHostedZone already exists (status: $STACK_STATUS) - skipping"
          fi

      - name: Get hosted zone ID from SSM
        id: get-zone
        run: |
          HOSTED_ZONE_ID=$(aws ssm get-parameter \
            --name /snaphomz/hosted-zone/snaphomz.in/zone-id \
            --query 'Parameter.Value' --output text)
          echo "hosted_zone_id=$HOSTED_ZONE_ID" >> $GITHUB_OUTPUT
          echo "Hosted Zone ID: $HOSTED_ZONE_ID"

      - name: Show Route53 name servers
        run: |
          NS=$(aws ssm get-parameter \
            --name /snaphomz/hosted-zone/snaphomz.in/name-servers \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          if [[ -n "$NS" ]]; then
            echo "Route53 name servers for snaphomz.in (update Namecheap if delegating):"
            echo "$NS" | tr ',' '\n'
          fi

  # ── Job 3: Ensure ACM cert is ISSUED (snaphomz.in + www.snaphomz.in) ───────
  # Namecheap is authoritative — we cannot use CDK/Route53 DNS validation.
  # Strategy: request cert via CLI, store ARN in SSM, output Namecheap CNAME
  # instructions, and FAIL until user adds the CNAMEs and cert reaches ISSUED.
  # On re-run (cert already ISSUED), outputs cert_arn and continues to deploy.
  prepare-certificate:
    needs: [setup, hosted-zone]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      cert_arn: ${{ steps.check-cert.outputs.cert_arn }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Find or create certificate
        id: check-cert
        run: |
          set -e
          SSM_PARAM="/snaphomz/india/certificate-with-www-arn"
          APEX="snaphomz.in"
          WWW="www.snaphomz.in"

          # ── Try SSM-stored ARN first ──────────────────────────────────────
          CERT_ARN=$(aws ssm get-parameter \
            --name "$SSM_PARAM" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")

          if [[ -n "$CERT_ARN" ]]; then
            STATUS=$(aws acm describe-certificate \
              --certificate-arn "$CERT_ARN" \
              --query 'Certificate.Status' --output text 2>/dev/null || echo "NOT_FOUND")
            echo "Stored cert $CERT_ARN status: $STATUS"

            if [[ "$STATUS" == "ISSUED" ]]; then
              echo "cert_arn=$CERT_ARN" >> $GITHUB_OUTPUT
              echo "Certificate is ISSUED. Continuing to deploy."
              exit 0
            elif [[ "$STATUS" == "PENDING_VALIDATION" ]]; then
              echo ""
              echo "================================================================"
              echo " CERT PENDING VALIDATION — ACTION REQUIRED IN NAMECHEAP"
              echo "================================================================"
              echo " Add these CNAME records in Namecheap > Advanced DNS > snaphomz.in:"
              echo ""
              aws acm describe-certificate --certificate-arn "$CERT_ARN" \
                --query 'Certificate.DomainValidationOptions[].[DomainName,ResourceRecord.Name,ResourceRecord.Value]' \
                --output text | while IFS=$'\t' read -r domain name value; do
                  # Strip trailing dots and the apex domain from the host
                  HOST=$(echo "$name" | sed "s/\\.${APEX}\\.$//; s/\\.$//")
                  echo "  Domain : $domain"
                  echo "  Type   : CNAME"
                  echo "  Host   : $HOST"
                  echo "  Value  : $value"
                  echo ""
                done
              echo "  Then wait ~5 min for ACM to validate, then re-run this workflow."
              echo "================================================================"
              exit 1
            else
              echo "Stored cert status '$STATUS' — will request a new cert."
            fi
          fi

          # ── No valid stored cert — request a new one ──────────────────────
          echo "Requesting new ACM certificate: $APEX + $WWW ..."
          CERT_ARN=$(aws acm request-certificate \
            --domain-name "$APEX" \
            --subject-alternative-names "$WWW" \
            --validation-method DNS \
            --idempotency-token snaphomzindiawww1 \
            --query 'CertificateArn' --output text)

          echo "New cert ARN: $CERT_ARN"
          aws ssm put-parameter \
            --name "$SSM_PARAM" \
            --value "$CERT_ARN" \
            --type String \
            --overwrite

          # Wait for validation records to populate
          sleep 20

          echo ""
          echo "================================================================"
          echo " NEW CERT REQUESTED — ACTION REQUIRED IN NAMECHEAP"
          echo "================================================================"
          echo " Add these CNAME records in Namecheap > Advanced DNS > snaphomz.in:"
          echo ""
          aws acm describe-certificate --certificate-arn "$CERT_ARN" \
            --query 'Certificate.DomainValidationOptions[].[DomainName,ResourceRecord.Name,ResourceRecord.Value]' \
            --output text | while IFS=$'\t' read -r domain name value; do
              HOST=$(echo "$name" | sed "s/\\.${APEX}\\.$//; s/\\.$//")
              echo "  Domain : $domain"
              echo "  Type   : CNAME"
              echo "  Host   : $HOST"
              echo "  Value  : $value"
              echo ""
            done
          echo "  Then wait ~5 min for ACM to validate, then re-run this workflow."
          echo "================================================================"
          exit 1

  # ── Job 4: Build + CDK deploy + S3 upload ─────────────────────────────────
  deploy:
    needs: [setup, hosted-zone, prepare-certificate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    environment:
      name: ${{ needs.setup.outputs.environment }}
      url: https://snaphomz.in

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Build Vite application
        run: npm run build

      - name: Install CDK dependencies
        working-directory: infra
        run: npm install

      - name: Build CDK TypeScript
        working-directory: infra
        run: npm run build

      - name: Deploy CDK static site stack
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          CUSTOM_DOMAIN: snaphomz.in
          WWW_DOMAIN: www.snaphomz.in
          HOSTED_ZONE_ID: ${{ needs.hosted-zone.outputs.hosted_zone_id }}
          HOSTED_ZONE_NAME: snaphomz.in
          CERTIFICATE_ARN: ${{ needs.prepare-certificate.outputs.cert_arn }}
        run: |
          echo "Deploying snaphomz-india-$ENVIRONMENT..."
          echo "Hosted Zone:   $HOSTED_ZONE_ID"
          echo "Custom Domain: $CUSTOM_DOMAIN"
          echo "WWW Domain:    $WWW_DOMAIN"
          echo "Cert ARN:      $CERTIFICATE_ARN"
          npx cdk deploy snaphomz-india-$ENVIRONMENT --require-approval never
          echo "CDK deploy complete"

      - name: Get deployment resources from SSM
        id: resources
        env:
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
        run: |
          BUCKET=$(aws ssm get-parameter --name /snaphomz/india/$ENVIRONMENT/bucket-name --query 'Parameter.Value' --output text)
          DIST_ID=$(aws ssm get-parameter --name /snaphomz/india/$ENVIRONMENT/distribution-id --query 'Parameter.Value' --output text)
          DIST_DOMAIN=$(aws ssm get-parameter --name /snaphomz/india/$ENVIRONMENT/distribution-domain --query 'Parameter.Value' --output text)
          echo "bucket=$BUCKET"           >> $GITHUB_OUTPUT
          echo "dist-id=$DIST_ID"         >> $GITHUB_OUTPUT
          echo "dist-domain=$DIST_DOMAIN" >> $GITHUB_OUTPUT
          echo "Bucket:    $BUCKET"
          echo "Dist ID:   $DIST_ID"
          echo "CF Domain: $DIST_DOMAIN"

      - name: Upload to S3
        env:
          BUCKET: ${{ steps.resources.outputs.bucket }}
        run: |
          aws s3 sync dist/ s3://$BUCKET/ --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "*.html" --exclude "*.json" --exclude "*.xml"
          aws s3 sync dist/ s3://$BUCKET/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" --content-type "text/html"
          aws s3 sync dist/ s3://$BUCKET/ \
            --cache-control "public, max-age=3600" \
            --include "*.json" --include "*.xml"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.resources.outputs.dist-id }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "Deployment complete!"
          echo "  URL:       https://snaphomz.in"
          echo "  CF Domain: https://${{ steps.resources.outputs.dist-domain }}"
          echo "  Bucket:    ${{ steps.resources.outputs.bucket }}"
          echo "  Dist ID:   ${{ steps.resources.outputs.dist-id }}"
