name: Deploy Snaphomz India to AWS

on:
  push:
    branches:
      - main
      - develop
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'demo'
        type: choice
        options:
          - demo
          - staging
          - prod
      create_hosted_zone:
        description: 'Create hosted zone (only needed once)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '18'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      deploy_infra: ${{ steps.set-env.outputs.deploy_infra }}
    
    steps:
      - name: Set environment from branch
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            DEPLOY_INFRA="${{ github.event.inputs.create_hosted_zone }}"
          else
            case "${{ github.ref }}" in
              refs/heads/main)
                ENVIRONMENT="prod"
                DEPLOY_INFRA="false"
                ;;
              refs/heads/staging)
                ENVIRONMENT="staging"
                DEPLOY_INFRA="false"
                ;;
              refs/heads/develop)
                ENVIRONMENT="demo"
                DEPLOY_INFRA="false"
                ;;
              *)
                ENVIRONMENT="demo"
                DEPLOY_INFRA="false"
                ;;
            esac
          fi
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "deploy_infra=$DEPLOY_INFRA" >> $GITHUB_OUTPUT
          echo "Deploying to environment: $ENVIRONMENT"
          echo "Deploy Infrastructure: $DEPLOY_INFRA"

  build-and-deploy:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    environment:
      name: ${{ needs.setup.outputs.environment }}
      url: ${{ steps.deployment.outputs.url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Build Vite application
        env:
          VITE_ENV: ${{ needs.setup.outputs.environment }}
        run: npm run build:${{ needs.setup.outputs.environment }}

      - name: Install CDK dependencies
        working-directory: infra
        run: npm install

      - name: Clean up existing S3 bucket if it exists
        env:
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
        run: |
          BUCKET_NAME="snaphomz-india-$ENVIRONMENT-${{ secrets.AWS_ACCOUNT_ID }}"
          echo "🧹 Checking for existing S3 bucket: $BUCKET_NAME"
          
          if aws s3 ls "s3://$BUCKET_NAME" 2>/dev/null; then
            echo "🗑️  Deleting existing S3 bucket and contents..."
            aws s3 rm "s3://$BUCKET_NAME" --recursive
            aws s3api delete-bucket --bucket "$BUCKET_NAME" --region us-east-1
            echo "✅ Bucket deleted successfully"
            
            # Wait for bucket deletion to complete
            sleep 5
          else
            echo "✅ No existing bucket found, proceeding with deployment"
          fi

      - name: Deploy infrastructure with CDK
        working-directory: infra
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          CUSTOM_DOMAIN: snaphomz.in
          HOSTED_ZONE_NAME: snaphomz.in
          CREATE_CERTIFICATE: 'true'
          CREATE_HOSTED_ZONE: 'true'
        run: |
          # Build CDK app TypeScript
          echo "📦 Building CDK app TypeScript..."
          npm run build
          echo "✅ Build complete"
          
          # Step 1: Check for existing hosted zone
          echo "🔍 Checking for existing hosted zone for snaphomz.in..."
          HOSTED_ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name snaphomz.in \
            --query 'HostedZones[0].Id' \
            --output text 2>/dev/null | cut -d'/' -f3)
          
          echo "📋 Zone ID query result: '$HOSTED_ZONE_ID'"
          
          if [ -z "$HOSTED_ZONE_ID" ] || [ "$HOSTED_ZONE_ID" == "None" ] || [ "$HOSTED_ZONE_ID" == "" ]; then
            echo "✅ Hosted zone not found. Creating..."
            
            # Deploy hosted zone stack with detailed error output
            echo "📡 Deploying SnaphomzHostedZone stack..."
            if npx cdk deploy SnaphomzHostedZone \
              -c deploy-mode=hosted-zone \
              --require-approval never 2>&1 | tee hosted-zone-deploy.log; then
              echo "✅ Hosted zone deployment succeeded"
            else
              DEPLOY_EXIT_CODE=${PIPESTATUS[0]}
              echo "❌ Hosted zone deployment failed with exit code: $DEPLOY_EXIT_CODE"
              echo "📋 Deployment log:"
              cat hosted-zone-deploy.log
              exit $DEPLOY_EXIT_CODE
            fi
            
            # Query AWS Route53 again to get the created zone ID (with retries for eventual consistency)
            echo "⏳ Waiting for hosted zone to be created..."
            sleep 3
            HOSTED_ZONE_ID=$(aws route53 list-hosted-zones-by-name \
              --dns-name snaphomz.in \
              --query 'HostedZones[0].Id' \
              --output text 2>/dev/null | cut -d'/' -f3)
            
            echo "📋 Zone ID after creation: '$HOSTED_ZONE_ID'"
            
            if [ -z "$HOSTED_ZONE_ID" ] || [ "$HOSTED_ZONE_ID" == "None" ]; then
              echo "⚠️  Could not retrieve hosted zone ID after creation, retrying..."
              sleep 5
              HOSTED_ZONE_ID=$(aws route53 list-hosted-zones-by-name \
                --dns-name snaphomz.in \
                --query 'HostedZones[0].Id' \
                --output text 2>/dev/null | cut -d'/' -f3)
              echo "📋 Zone ID after retry: '$HOSTED_ZONE_ID'"
            fi
            
            if [ -z "$HOSTED_ZONE_ID" ] || [ "$HOSTED_ZONE_ID" == "None" ]; then
              echo "❌ Failed to get hosted zone ID"
              HOSTED_ZONE_ID=""
            else
              echo "✅ Created hosted zone: $HOSTED_ZONE_ID"
            fi
          else
            echo "✅ Using existing hosted zone: $HOSTED_ZONE_ID"
          fi
          
          # Step 2: Deploy static site stack with validated hosted zone ID
          echo ""
          echo "📡 Deploying static site stack..."
          if [ -z "$HOSTED_ZONE_ID" ] || [ "$HOSTED_ZONE_ID" == "None" ] || [ "$HOSTED_ZONE_ID" == "" ]; then
            echo "⚠️  Warning: Hosted zone ID not found/empty, deploying without custom domain"
            echo "📋 Deployment will create S3 and CloudFront but NO Route53 Alias record"
            npx cdk deploy snaphomz-india-$ENVIRONMENT \
              -c deploy-mode=static-site \
              --require-approval never
          else
            echo "✅ Deploying static site stack with hosted zone: $HOSTED_ZONE_ID"
            echo "📋 This will create Route53 Alias record: snaphomz.in → CloudFront"
            npx cdk deploy snaphomz-india-$ENVIRONMENT \
              -c deploy-mode=static-site \
              -c hosted-zone-id=$HOSTED_ZONE_ID \
              --require-approval never
          fi
          echo "✅ Static site deployment complete"

      - name: Get S3 bucket name and CloudFront distribution ID
        id: aws-resources
        env:
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
        run: |
          BUCKET_NAME=$(aws ssm get-parameter --name /snaphomz/india/$ENVIRONMENT/bucket-name --query 'Parameter.Value' --output text)
          DISTRIBUTION_ID=$(aws ssm get-parameter --name /snaphomz/india/$ENVIRONMENT/distribution-id --query 'Parameter.Value' --output text)
          DISTRIBUTION_DOMAIN=$(aws ssm get-parameter --name /snaphomz/india/$ENVIRONMENT/distribution-domain --query 'Parameter.Value' --output text)
          
          echo "bucket-name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "distribution-id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT
          echo "distribution-domain=$DISTRIBUTION_DOMAIN" >> $GITHUB_OUTPUT
          echo "S3 Bucket: $BUCKET_NAME"
          echo "CloudFront Distribution: $DISTRIBUTION_ID"
          echo "Distribution Domain: $DISTRIBUTION_DOMAIN"

      - name: Upload to S3
        env:
          BUCKET_NAME: ${{ steps.aws-resources.outputs.bucket-name }}
        run: |
          # Upload static assets with long cache
          aws s3 sync dist/ s3://$BUCKET_NAME/ --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.xml"
          
          # Upload HTML with short cache
          aws s3 sync dist/ s3://$BUCKET_NAME/ --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --content-type "text/html"
          
          # Upload manifest and config files
          aws s3 sync dist/ s3://$BUCKET_NAME/ --delete \
            --cache-control "public, max-age=3600" \
            --include "*.json" \
            --include "*.xml"

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ steps.aws-resources.outputs.distribution-id }}
        run: |
          aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
          echo "CloudFront cache invalidation initiated"

      - name: Deployment summary
        id: deployment
        env:
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          DISTRIBUTION_ID: ${{ steps.aws-resources.outputs.distribution-id }}
          DISTRIBUTION_DOMAIN: ${{ steps.aws-resources.outputs.distribution-domain }}
        run: |
          # Determine the URL
          URL="https://$DISTRIBUTION_DOMAIN"
          echo "url=$URL" >> $GITHUB_OUTPUT
          
          echo "✅ Deployment Complete!"
          echo "Environment: $ENVIRONMENT"
          echo "S3 Bucket: ${{ steps.aws-resources.outputs.bucket-name }}"
          echo "CloudFront Distribution: $DISTRIBUTION_ID"
          echo "Distribution Domain: $DISTRIBUTION_DOMAIN"
          echo "URL: $URL"
          echo "Deployment URL: $URL"

  notify:
    needs: [setup, build-and-deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Snaphomz India Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Snaphomz India Deployment ${{ job.status }}*\n*Environment:* ${{ needs.setup.outputs.environment }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true
